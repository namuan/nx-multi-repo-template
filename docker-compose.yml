version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-go
      - api-java

  api-go:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - PORT=8080

  api-java:
    build:
      context: .
      dockerfile: apps/api-java/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8080
