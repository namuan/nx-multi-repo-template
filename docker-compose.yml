version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-go:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost:4200
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-java:
    build:
      context: .
      dockerfile: apps/api-java/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
