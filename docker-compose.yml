services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleet_db
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migrate:
    image: migrate/migrate:v4.17.1
    command: ["-path", "/migrations", "-database", "postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable", "up"]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  db-seed:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: fleet_password
    command:
      - sh
      - -c
      - >-
        if [ "$(psql -h db -U fleet_user -d fleet_db -tAc 'SELECT COUNT(*) FROM tenants;' | xargs)" = "0" ]; then
          psql -h db -U fleet_user -d fleet_db -v ON_ERROR_STOP=1 -f /seed/demo.sql;
        else
          echo "Demo seed already exists, skipping";
        fi
    volumes:
      - ./db/seeds/demo.sql:/seed/demo.sql:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ─── Go API (Telemetry + WebSocket) ─────────────────────────────────────────
  api-go:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      - "9101:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable"
      JWT_SECRET: "fleet-super-secret-jwt-key-change-in-production"
      ALLOWED_ORIGIN: "http://localhost:9100"
    depends_on:
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Java API (Fleet Management REST) ───────────────────────────────────────
  api-java:
    build:
      context: .
      dockerfile: apps/api-java/Dockerfile
    ports:
      - "9102:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/fleet_db"
      SPRING_DATASOURCE_USERNAME: "fleet_user"
      SPRING_DATASOURCE_PASSWORD: "fleet_password"
      JWT_SECRET: "fleet-super-secret-jwt-key-change-in-production"
      JWT_EXPIRATION_MS: "86400000"
      ALLOWED_ORIGIN: "http://localhost:9100"
    depends_on:
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "9100:80"
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Device Simulator (demo only) ───────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    environment:
      GO_API_URL: "http://api-go:8080"
      INTERVAL_MS: "3000"
    depends_on:
      api-go:
        condition: service_healthy
    profiles:
      - demo

volumes:
  postgres_data:
