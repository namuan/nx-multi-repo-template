version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleet_db
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Go API (Telemetry + WebSocket) ─────────────────────────────────────────
  api-go:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable"
      JWT_SECRET: "fleet-super-secret-jwt-key-change-in-production"
      ALLOWED_ORIGIN: "http://localhost:4200"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Java API (Fleet Management REST) ───────────────────────────────────────
  api-java:
    build:
      context: .
      dockerfile: apps/api-java/Dockerfile
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/fleet_db"
      SPRING_DATASOURCE_USERNAME: "fleet_user"
      SPRING_DATASOURCE_PASSWORD: "fleet_password"
      JWT_SECRET: "fleet-super-secret-jwt-key-change-in-production"
      JWT_EXPIRATION_MS: "86400000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Device Simulator (demo only) ───────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    environment:
      GO_API_URL: "http://api-go:8080"
      INTERVAL_MS: "3000"
    depends_on:
      api-go:
        condition: service_healthy
    profiles:
      - demo

volumes:
  postgres_data:
