services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-fleet_db}"
      POSTGRES_USER: "${POSTGRES_USER:-fleet_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-fleet_password}"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet_user} -d ${POSTGRES_DB:-fleet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migrate:
    image: migrate/migrate:v4.17.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-fleet_user}:${POSTGRES_PASSWORD:-fleet_password}@db:5432/${POSTGRES_DB:-fleet_db}?sslmode=disable",
        "up"
      ]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  db-seed:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD:-fleet_password}"
    command:
      - sh
      - -c
      - >-
        if [ "$(psql -h db -U ${POSTGRES_USER:-fleet_user} -d ${POSTGRES_DB:-fleet_db} -tAc 'SELECT COUNT(*) FROM tenants;' | xargs)" = "0" ]; then
          psql -h db -U ${POSTGRES_USER:-fleet_user} -d ${POSTGRES_DB:-fleet_db} -v ON_ERROR_STOP=1 -f /seed/demo.sql;
        else
          echo "Demo seed already exists, skipping";
        fi
    volumes:
      - ./db/seeds/demo.sql:/seed/demo.sql:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ─── Go API (Telemetry + WebSocket) ─────────────────────────────────────────
  api-go:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      - "${API_GO_PORT:-9101}:8080"
    environment:
      GO_PORT: "${GO_PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL:-postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-fleet-super-secret-jwt-key-change-in-production}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-http://localhost:9100}"
    depends_on:
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Java API (Fleet Management REST) ───────────────────────────────────────
  api-java:
    build:
      context: .
      dockerfile: apps/api-java/Dockerfile
    ports:
      - "${API_JAVA_PORT:-9102}:8080"
    environment:
      JAVA_PORT: "${JAVA_PORT:-8080}"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/fleet_db}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-fleet_user}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-fleet_password}"
      JWT_SECRET: "${JWT_SECRET:-fleet-super-secret-jwt-key-change-in-production}"
      JWT_EXPIRATION_MS: "${JWT_EXPIRATION_MS:-86400000}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-http://localhost:9100}"
    depends_on:
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-9100}:80"
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Observability (local profile) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./tools/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./tools/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./tools/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./tools/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    profiles:
      - observability

  # ─── Device Simulator (demo only) ───────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    environment:
      GO_API_URL: "${SIMULATOR_GO_API_URL:-http://api-go:8080}"
      INTERVAL_MS: "${INTERVAL_MS:-3000}"
    depends_on:
      api-go:
        condition: service_healthy
    profiles:
      - demo

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
