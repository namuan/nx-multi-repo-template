name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for nx affected

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Dependency vulnerability scan
        run: |
          pnpm audit --audit-level=high
          (cd apps/api-go && govulncheck ./...)
          (cd apps/api-java && mvn -DskipTests org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7)

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run lint (affected)
        run: pnpm exec nx affected -t lint --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Run tests (affected)
        run: pnpm exec nx affected -t test --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Build (affected)
        run: pnpm exec nx affected -t build --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Docker build (affected, no push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec nx affected -t docker:build --parallel=2 --base=$NX_BASE --head=$NX_HEAD
