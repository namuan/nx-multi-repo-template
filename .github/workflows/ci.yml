name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for nx affected

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Dependency vulnerability scan
        run: |
          pnpm audit --audit-level=high
          (cd apps/api-go && govulncheck ./...)
          (cd apps/api-java && mvn -DskipTests org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7)

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v5

      - name: Run lint (affected)
        run: pnpm exec nx affected -t lint --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Run tests (affected)
        run: pnpm exec nx affected -t test --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Run coverage gates
        run: |
          pnpm exec nx run frontend:coverage
          pnpm exec nx run api-go:coverage
          pnpm exec nx run api-java:coverage

      - name: Build (affected)
        run: pnpm exec nx affected -t build --parallel=3 --base=$NX_BASE --head=$NX_HEAD

      - name: Docker build (affected, no push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec nx affected -t docker:build --parallel=2 --base=$NX_BASE --head=$NX_HEAD

  api-e2e:
    name: Backend API E2E
    runs-on: ubuntu-latest
    needs: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend API e2e
        id: run_api_e2e
        continue-on-error: true
        run: pnpm run test:e2e:backend:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-playwright-report
          path: |
            dist/.playwright/apps/api-e2e/report
            dist/.playwright/apps/api-e2e/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Comment backend e2e report
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: api-e2e-report
          message: |
            ## Backend API E2E Report
            - Status: **${{ steps.run_api_e2e.outcome }}**
            - Artifact: **api-e2e-playwright-report**
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail job if backend e2e failed
        if: steps.run_api_e2e.outcome == 'failure'
        run: exit 1

  frontend-e2e:
    name: Frontend UI E2E
    runs-on: ubuntu-latest
    needs: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend UI e2e
        id: run_frontend_e2e
        continue-on-error: true
        run: pnpm run test:e2e:frontend:ci

      - name: Upload frontend Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-playwright-report
          path: |
            dist/.playwright/apps/frontend-e2e/report
            dist/.playwright/apps/frontend-e2e/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Comment frontend e2e report
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: frontend-e2e-report
          message: |
            ## Frontend UI E2E Report
            - Status: **${{ steps.run_frontend_e2e.outcome }}**
            - Artifact: **frontend-e2e-playwright-report**
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail job if frontend e2e failed
        if: steps.run_frontend_e2e.outcome == 'failure'
        run: exit 1
