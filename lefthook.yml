pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "**/*.{js,jsx,ts,tsx,css,md,json,yml,yaml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

    eslint:
      glob: "**/*.{js,jsx,ts,tsx}"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

    gofmt:
      glob: "**/*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    go-lint:
      glob: "apps/api-go/**/*.go"
      run: npm run go:lint

    java-compile:
      glob: "apps/api-java/**/*.java"
      run: mvn -f apps/api-java/pom.xml -q -DskipTests -Dmaven.compiler.fork=true -Dmaven.compiler.forceJavacCompilerUse=true compile

pre-push:
  commands:
    nx-affected-tests:
      run: >-
        BASE="$(git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)";
        pnpm nx affected -t test --base="$BASE" --head=HEAD --parallel=3
