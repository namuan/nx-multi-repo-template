replicaCount: 1

image:
  repository: myregistry/api-go
  tag: '0.1.0'
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  - name: PORT
    value: '8080'
  - name: ALLOWED_ORIGIN
    value: 'https://frontend.example.com'

ingress:
  enabled: false
  className: nginx
  host: api-go.example.com
  path: /

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

config: {}

secret: {}

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

monitoring:
  serviceAnnotations: {}
  podAnnotations: {}
  serviceMonitor:
    enabled: false
    namespace: ''
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
    additionalLabels: {}
