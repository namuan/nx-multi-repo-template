replicaCount: 1

image:
  repository: myregistry/api-java
  tag: '0.1.0'
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  - name: JAVA_PORT
    value: '8080'

ingress:
  enabled: false
  className: nginx
  host: api-java.example.com
  path: /

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

config: {}

secret: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

monitoring:
  serviceAnnotations: {}
  podAnnotations: {}
  serviceMonitor:
    enabled: false
    namespace: ''
    interval: 15s
    scrapeTimeout: 10s
    path: /actuator/prometheus
    additionalLabels: {}
