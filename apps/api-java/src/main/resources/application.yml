spring:
  application:
    name: fleet-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleet_db}
    username: ${SPRING_DATASOURCE_USERNAME:fleet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fleet_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

fleet:
  jwt:
    secret: ${JWT_SECRET:fleet-super-secret-jwt-key-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.example.fleet: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
