services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleet_db
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleet_user -d fleet_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migrate:
    image: migrate/migrate:v4.17.1
    command:
      [
        '-path',
        '/migrations',
        '-database',
        'postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable',
        'up',
      ]
    volumes:
      - ../../db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  api-go:
    build:
      context: ../..
      dockerfile: apps/api-go/Dockerfile
    ports:
      - '19101:8080'
    environment:
      GO_PORT: '8080'
      DATABASE_URL: 'postgres://fleet_user:fleet_password@db:5432/fleet_db?sslmode=disable'
      JWT_SECRET: 'fleet-super-secret-jwt-key-change-in-production'
      ALLOWED_ORIGIN: 'http://localhost:9100'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-java:
    build:
      context: ../..
      dockerfile: apps/api-java/Dockerfile
    ports:
      - '19102:8080'
    environment:
      JAVA_PORT: '8080'
      SPRING_DATASOURCE_URL: 'jdbc:postgresql://db:5432/fleet_db'
      SPRING_DATASOURCE_USERNAME: 'fleet_user'
      SPRING_DATASOURCE_PASSWORD: 'fleet_password'
      JWT_SECRET: 'fleet-super-secret-jwt-key-change-in-production'
      JWT_EXPIRATION_MS: '86400000'
      ALLOWED_ORIGIN: 'http://localhost:9100'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/actuator/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - '19190:9090'
    volumes:
      - ../../tools/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api-go:
        condition: service_healthy
      api-java:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:9090/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - '19300:3000'
    environment:
      GF_SECURITY_ADMIN_USER: 'admin'
      GF_SECURITY_ADMIN_PASSWORD: 'admin'
    volumes:
      - ../../tools/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../tools/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../tools/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  prometheus_data:
  grafana_data:
