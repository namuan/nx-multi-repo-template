# Creates a single-window dev session with 4 panes:
# 0) infra, 1) auth, 2) gateway, 3) kaiops-cloud

# Reset session if it already exists
if-shell "tmux has-session -t neom-dev 2>/dev/null" "kill-session -t neom-dev"
run-shell -b 'cd "#{pane_current_path}" && rm -f .tmux-dev-ready'

# Create session/window at current working directory
new-session -d -s neom-dev -n dev -c "#{pane_current_path}" './tools/tmux/run-infra.sh'
set-option -t neom-dev:dev remain-on-exit on

# Pane 1: auth worker
split-window -h -t neom-dev:dev.0 -c "#{pane_current_path}" './tools/tmux/run-after-ready.sh "npm run auth:start"'

# Pane 2: api gateway
split-window -v -t neom-dev:dev.1 -c "#{pane_current_path}" './tools/tmux/run-after-ready.sh "npm run gateway:start"'

# Pane 3: kaiops frontend
split-window -v -t neom-dev:dev.0 -c "#{pane_current_path}" './tools/tmux/run-after-ready.sh "npm run kaiops:serve"'

# Make pane layout easy to monitor
select-layout -t neom-dev:dev tiled
select-pane -t neom-dev:dev.0
