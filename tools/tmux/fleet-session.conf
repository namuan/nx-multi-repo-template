# Fleet Management — tmux dev session
#
# Layout:
#   window 1 "logs" → unified logs stream
#   window 2 "dev"  → all app panes (DB, Go, Frontend, Java, Simulator)

# ── Reset ──────────────────────────────────────────────────────────────────
if-shell "tmux has-session -t fleet-dev 2>/dev/null" "kill-session -t fleet-dev"
run-shell 'rm -f .tmux-dev-ready && mkdir -p tmp/logs && : > tmp/logs/all.log'

# ── Global options ──────────────────────────────────────────────────────────
set-option -g pane-border-status top
set-option -g pane-border-format " #{pane_title} "
set-option -g pane-active-border-style "fg=colour33"
set-option -g pane-border-style "fg=colour238"

# ── Window 1: logs ───────────────────────────────────────────────────────────
new-session  -d -s fleet-dev -n "logs"
set-option -t fleet-dev:logs remain-on-exit on
select-pane -t fleet-dev:logs.0 -T "📜 Unified Logs"
send-keys -t fleet-dev:logs 'npm run dev:logs:all' Enter

# ── Window 2: dev (5 panes) ─────────────────────────────────────────────────
new-window -t fleet-dev -n "dev"

# Start from deterministic 2x2, then add simulator pane
split-window -v -p 50 -t fleet-dev:dev.0
split-window -h -p 50 -t fleet-dev:dev.0
split-window -h -p 50 -t fleet-dev:dev.2
split-window -v -p 45 -t fleet-dev:dev.2

set-option -t fleet-dev:dev remain-on-exit on

# ── Pane titles ──────────────────────────────────────────────────────────────
select-pane -t fleet-dev:dev.0 -T "🗄  PostgreSQL"
select-pane -t fleet-dev:dev.1 -T "🐹 Go API   :9101"
select-pane -t fleet-dev:dev.2 -T "⚛  Frontend  :9100"
select-pane -t fleet-dev:dev.3 -T "☕ Java API  :9102"
select-pane -t fleet-dev:dev.4 -T "📡 Simulator"

# ── Run commands ──────────────────────────────────────────────────────────────
send-keys -t fleet-dev:dev.0 './tools/tmux/log-exec.sh db "./tools/tmux/fleet-infra.sh"'                           Enter
send-keys -t fleet-dev:dev.1 './tools/tmux/run-after-ready.sh "npm run dev:go" api-go'                               Enter
send-keys -t fleet-dev:dev.2 './tools/tmux/run-after-ready.sh "npm run dev:frontend" frontend'                       Enter
send-keys -t fleet-dev:dev.3 './tools/tmux/run-after-ready.sh "npm run dev:java" api-java'                           Enter
send-keys -t fleet-dev:dev.4 './tools/tmux/run-after-ready.sh "npm run dev:simulate" simulator'                      Enter

# Keep all app panes visible and balanced
select-layout -t fleet-dev:dev tiled

# Start users on logs window (window 1)
select-window -t fleet-dev:logs
