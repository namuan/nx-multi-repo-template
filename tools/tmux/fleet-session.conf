# Fleet Management — tmux dev session
#
# Layout (window 1: "dev"):
#
#   ┌──────────────────┬──────────────────┐
#   │  0  PostgreSQL   │  1  Go API       │
#   │     (infra)      │     :9101        │
#   ├──────────────────┼──────────────────┤
#   │  2  Frontend     │  3  Java API     │
#   │     :9100        │     :9102        │
#   └──────────────────┴──────────────────┘
#
# Layout (window 2: "simulator"):
#
#   ┌────────────────────────────────────┐
#   │  GPS device simulator (8 devices) │
#   └────────────────────────────────────┘
#
# Pane index ordering (tmux: left-to-right, top-to-bottom):
#   Split vertically first → stable top/bottom rows.
#   Then split each row horizontally → stable left/right columns.
#   This guarantees a true 2×2 with predictable indices.

# ── Reset ──────────────────────────────────────────────────────────────────
if-shell "tmux has-session -t fleet-dev 2>/dev/null" "kill-session -t fleet-dev"
run-shell 'rm -f .tmux-dev-ready'

# ── Global options ──────────────────────────────────────────────────────────
set-option -g pane-border-status top
set-option -g pane-border-format " #{pane_title} "
set-option -g pane-active-border-style "fg=colour33"
set-option -g pane-border-style "fg=colour238"

# ── Window 1: dev (2 × 2 grid) ─────────────────────────────────────────────
#
# Step 1: full screen → top row (pane 0) + bottom row (pane 1)
new-session  -d -s fleet-dev -n "dev"
split-window -v -p 50 -t fleet-dev:dev.0

# Step 2: split top row → pane 0 (top-left) | pane 1 (top-right)
split-window -h -p 50 -t fleet-dev:dev.0

# Step 3: split bottom row → pane 2 (bot-left) | pane 3 (bot-right)
#   After step 2 the bottom row is at positional index 2.
split-window -h -p 50 -t fleet-dev:dev.2

set-option -t fleet-dev:dev remain-on-exit on

# ── Pane titles ──────────────────────────────────────────────────────────────
select-pane -t fleet-dev:dev.0 -T "🗄  PostgreSQL"
select-pane -t fleet-dev:dev.1 -T "🐹 Go API   :9101"
select-pane -t fleet-dev:dev.2 -T "⚛  Frontend  :9100"
select-pane -t fleet-dev:dev.3 -T "☕ Java API  :9102"

# ── Run commands ──────────────────────────────────────────────────────────────
send-keys -t fleet-dev:dev.0 './tools/tmux/fleet-infra.sh'                             Enter
send-keys -t fleet-dev:dev.1 './tools/tmux/run-after-ready.sh "npm run dev:go"'        Enter
send-keys -t fleet-dev:dev.2 './tools/tmux/run-after-ready.sh "npm run dev:frontend"'  Enter
send-keys -t fleet-dev:dev.3 './tools/tmux/run-after-ready.sh "npm run dev:java"'      Enter

# Focus the infra pane so the user watches the DB come up first
select-pane -t fleet-dev:dev.0

# ── Window 2: simulator ─────────────────────────────────────────────────────
new-window -t fleet-dev -n "simulator"
send-keys -t fleet-dev:simulator './tools/tmux/run-after-ready.sh "npm run dev:simulate"' Enter

# ── Return to dev window ─────────────────────────────────────────────────────
select-window -t fleet-dev:dev
