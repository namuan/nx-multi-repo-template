# Fleet Management — tmux dev session
#
# Layout (window 1: "dev"):
#
#   ┌──────────────────┬──────────────────┐
#   │  0  PostgreSQL   │  1  Go API       │
#   │     (infra)      │     :8081        │
#   ├──────────────────┼──────────────────┤
#   │  2  Frontend     │  3  Java API     │
#   │     :4200        │     :8082        │
#   └──────────────────┴──────────────────┘
#
# Layout (window 2: "simulator"):
#
#   ┌────────────────────────────────────┐
#   │  GPS device simulator (8 devices) │
#   └────────────────────────────────────┘

# ── Reset ──────────────────────────────────────────────────────────────────
if-shell "tmux has-session -t fleet-dev 2>/dev/null" "kill-session -t fleet-dev"
run-shell 'rm -f .tmux-dev-ready'

# ── Global options ──────────────────────────────────────────────────────────
set-option -g pane-border-status top
set-option -g pane-border-format " #{pane_title} "
set-option -g pane-active-border-style "fg=colour33"
set-option -g pane-border-style "fg=colour238"

# ── Window 1: dev (2 × 2 grid) ─────────────────────────────────────────────

# Pane 0 — PostgreSQL (infra, signals readiness)
new-session -d -s fleet-dev -n "dev" -c "#{pane_current_path}" \
  './tools/tmux/fleet-infra.sh'
select-pane -t fleet-dev:dev.0 -T "🗄  PostgreSQL"
set-option -t fleet-dev:dev remain-on-exit on

# Pane 1 — Go API (right of pane 0)
split-window -h -t fleet-dev:dev.0 -c "#{pane_current_path}" \
  './tools/tmux/run-after-ready.sh "npm run dev:go"'
select-pane -t fleet-dev:dev.1 -T "🐹 Go API   :8081"

# Pane 2 — Frontend (below pane 0, left column)
split-window -v -t fleet-dev:dev.0 -c "#{pane_current_path}" \
  './tools/tmux/run-after-ready.sh "npm run dev:frontend"'
select-pane -t fleet-dev:dev.2 -T "⚛  Frontend  :4200"

# Pane 3 — Java API (below pane 1, right column)
split-window -v -t fleet-dev:dev.1 -c "#{pane_current_path}" \
  './tools/tmux/run-after-ready.sh "npm run dev:java"'
select-pane -t fleet-dev:dev.3 -T "☕ Java API  :8082"

# Focus the infra pane so the user watches the DB come up first
select-pane -t fleet-dev:dev.0

# ── Window 2: simulator ─────────────────────────────────────────────────────
new-window -t fleet-dev -n "simulator" -c "#{pane_current_path}" \
  './tools/tmux/run-after-ready.sh "npm run simulate"'

# ── Return to dev window ─────────────────────────────────────────────────────
select-window -t fleet-dev:dev
