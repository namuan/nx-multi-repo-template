version: "2"

run:
  concurrency: 4
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - staticcheck
    - revive
    - govet
    - errcheck
    - gosec
    - unused
    - modernize

formatters:
  enable:
    - gci
    - gofumpt

formatters-settings:
  gci:
    custom-order: true
    sections:
      - standard
      - default
      - prefix(github.com/nx-polyglot)
  gofumpt:
    extra-rules: true

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
  max-issues-per-linter: 50
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true